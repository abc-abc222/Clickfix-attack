<button id="copy" class="wiki-toggle" aria-label="コピー">
  &gt;簡単３ステップを表示する
</button>

<script>
  document.getElementById('copy').onclick = async () => {
    await navigator.clipboard.writeText('コピーしたい文字列');
  };
</script>

<style>
.wiki-toggle{
  width: 32px;
  height: 32px;
  line-height: 32px;
  padding: 0;
  border: 1px solid #a2a9b1;
  background: #f8f9fa;
  color: #202122;
  font-size: 22px;
  font-family: "Times New Roman", serif;
  transform: rotate(90deg);
  cursor: pointer;
  border-radius: 4px;
}
.wiki-toggle:hover{
  background: #fff;
  border-color: #72777d;
}
</style>
